<!doctype html>
<html lang="en" class="">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="./style.css">
  <script type="module" src="./scripts/darkMode.js"></script>
  <script type="module" src="./scripts/data.js"></script>
  <script type="module" src="./scripts/filterBanderas.js"></script>
  <title>semana-final</title>
</head>

<body>
  <!--encabezado-->
  <nav class="flex justify-between p-5 items-center md:py-7 shadow-sm">
    <h1 class="font-bold pl-5 lg:text-2xl">Where in the World?</h1>
    <button id="btn-dark" class="flex items-center gap-2 font-medium text-sm focus:outline-none pr-5">
      <img class="w-6 h-6 object-contain" src="https://img.icons8.com/?size=100&id=H3mmKEsuafpa&format=png&color=000000"
        alt="icono_luna">
      <span class="pr-4">Dark Mode</span>
    </button>
  </nav>

  <main class="bg-gray-100">
    <section class=" flex flex-col gap-5 w-full px-4 py-6 pt-15 pb-15 md:flex-row">
      <!--busqueda de banderas-->
      <div class="search-container w-full relative flex items-center lg:ml-10">
        <svg class="absolute left-5 top-1/2 -translate-y-1/2 text-gray-400 w-6 pointer-events-none" xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 16 16">
          <path fill="currentColor" fill-rule="evenodd"
            d="M9.965 11.026a5 5 0 1 1 1.06-1.06l2.755 2.754a.75.75 0 1 1-1.06 1.06zM10.5 7a3.5 3.5 0 1 1-7 0a3.5 3.5 0 0 1 7 0"
            clip-rule="evenodd" />
        </svg>
        <input id="filtro-input" class="bg-white w-full pl-14 pr-5 py-4 rounded-md shadow focus:outline-none text-sm lg:w-150" type="text"
          placeholder="Search for a country...">  
      </div>

      <!--Filter de banderas-->
      <select id="region-filter" class="bg-white w-50 px-5 py-4 lg:mr-10 rounded-sm shadow-sm focus:outline-none text-sm" name="regions">
      <option value="All">All</option>
       <option value="Asia">Asia</option>
       <option value="Europe">Europe</option>
       <option value="Africa">Africa</option>
       <option value="Oceania">Oceania</option>
       <option value="Americas">Americas</option>
       <option value="Polar">Polar</option>
       <option value="Antarctic Ocean">Antarctic Ocean</option>
       <option value="Antarctic">Antarctic</option>
      </select>
    </section>

    <!--APARTADO DONDE SE PINTARAN LAS BANDERAS -->
    <div id="banderaCont" class="flex flex-col items-center gap-10 md:grid md:grid-cols-2 lg:grid-cols-5 lg:gap-10 px-12" "></div>
    
  </main>
</body>

</html>
